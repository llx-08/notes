name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed for git push back to default branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync repo root into Hexo (_posts + imgs)
        run: |
          python scripts/sync_root_to_hexo_posts.py
          python scripts/sync_root_imgs_to_hexo.py

      - name: Commit synced _posts and imgs if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hexo-site/source/_posts/ hexo-site/source/imgs/
          if git diff --staged --quiet; then
            echo "No _posts/imgs changes; skip commit."
          else
            git commit -m "chore: sync hexo _posts and imgs from repo root [skip ci]"
            git push
            echo "Pushed updated _posts/imgs to default branch."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hexo-site/package-lock.json

      - name: Install dependencies
        working-directory: hexo-site
        run: npm ci

      - name: Generate site
        working-directory: hexo-site
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hexo-site/public
