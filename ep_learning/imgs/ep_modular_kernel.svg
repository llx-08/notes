<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400">
  <defs>
    <style>
      .t { font: 700 20px sans-serif; fill: #1a2332; }
      .h { font: 600 13px sans-serif; fill: #1a2332; }
      .p { font: 11px sans-serif; fill: #334155; }
      .s { font: 10px sans-serif; fill: #64748b; }
    </style>
    <marker id="b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>
  <rect width="960" height="400" fill="#f7f4ef"/>
  <text x="32" y="36" class="t">Modular MoE: mix Prepare/Finalize with Experts</text>
  <text x="32" y="58" class="s">Avoid combinatorial explosion of (comm x quant x gemm) fused kernels</text>

  <rect x="60" y="100" width="200" height="80" rx="8" fill="#e8f1ea" stroke="#3d6b4f"/>
  <text x="160" y="135" text-anchor="middle" class="h">Router</text>
  <text x="160" y="155" text-anchor="middle" class="p">pluggable</text>
  <path d="M270 140 H300" stroke="#64748b" stroke-width="2" marker-end="url(#b)"/>

  <rect x="305" y="90" width="240" height="100" rx="8" fill="#e7eef8" stroke="#3b5b8c"/>
  <text x="425" y="120" text-anchor="middle" class="h">PrepareAndFinalize</text>
  <text x="425" y="140" text-anchor="middle" class="p">DeepEP HT/LL | naive | no_dp</text>
  <text x="425" y="160" text-anchor="middle" class="p">dispatch + combine pair</text>
  <text x="425" y="180" text-anchor="middle" class="s">must stay consistent</text>
  <path d="M550 140 H580" stroke="#64748b" stroke-width="2" marker-end="url(#b)"/>

  <rect x="585" y="90" width="240" height="100" rx="8" fill="#f3e9d8" stroke="#8a5a2b"/>
  <text x="705" y="120" text-anchor="middle" class="h">ExpertsModular</text>
  <text x="705" y="140" text-anchor="middle" class="p">DeepGEMM | Triton | CUTLASS</text>
  <text x="705" y="160" text-anchor="middle" class="p">permute / GEMM / act</text>
  <text x="705" y="180" text-anchor="middle" class="s">TopKWeightAndReduce policy</text>

  <rect x="120" y="240" width="720" height="120" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="140" y="275" class="h">FusedMoEModularKernel = PrepareAndFinalize + Experts</text>
  <text x="140" y="300" class="p">Same Experts can pair with DeepEP or no_dp_ep; same DeepEP can pair with DeepGEMM or Triton.</text>
  <text x="140" y="325" class="p">Oracle picks a legal combination from quant + parallel config.</text>
</svg>
