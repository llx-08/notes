  <text x="100" y="462" class="h">5. deepgemm_unpermute_and_reduce</text>
  <text x="100" y="480" class="tiny">x topk_weights, scatter via inv_perm -&gt; output [T, H] | TopKWeightAndReduceNoOP</text>

  <text x="80" y="530" class="lab">FP4 weights variant: DeepGemmFP4Experts -&gt; m_grouped_fp8_fp4_gemm_nt_contiguous (SM100+)</text>
