<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="960" viewBox="0 0 1180 960" font-family="Menlo,Consolas,monospace">
  <rect width="1180" height="960" fill="#0f1117"/>
  <text x="590" y="32" fill="#e6e6e6" font-size="21" text-anchor="middle" font-weight="bold">Qwen4Exp2 架构（vllm/model_executor/models/qwen4_exp2.py）</text>
  <text x="590" y="54" fill="#8a93a6" font-size="12.5" text-anchor="middle">Hybrid（Linear-Attn/GDN ↔ Full-Attn 交替）+ MoE + PLE + HyperConnection(HC) + MTP；HC/layer_types 均来自 checkpoint config</text>

  <!-- HC residual highway band (left) -->
  <rect x="70" y="150" width="70" height="640" rx="8" fill="#160f22" stroke="#8a6ac0" stroke-dasharray="4 3"/>
  <line x1="88" y1="150" x2="88" y2="790" stroke="#8a6ac0" stroke-width="2.5"/>
  <line x1="100" y1="150" x2="100" y2="790" stroke="#8a6ac0" stroke-width="2.5"/>
  <line x1="112" y1="150" x2="112" y2="790" stroke="#8a6ac0" stroke-width="2.5"/>
  <line x1="124" y1="150" x2="124" y2="790" stroke="#8a6ac0" stroke-width="2.5"/>
  <text x="105" y="810" fill="#b79ad9" font-size="10.5" text-anchor="middle">HC×HS</text>
  <text x="105" y="826" fill="#8a93a6" font-size="9.5" text-anchor="middle">残差高速公路</text>
  <text x="105" y="842" fill="#8a93a6" font-size="9.5" text-anchor="middle">(HC 条 lane)</text>

  <!-- Embedding -->
  <rect x="360" y="86" width="440" height="52" rx="8" fill="#1a2230" stroke="#5a90c0"/>
  <text x="580" y="108" fill="#cfe0f0" font-size="13" text-anchor="middle" font-weight="bold">Embedding: VocabParallelEmbedding</text>
  <text x="580" y="126" fill="#9fb0c6" font-size="10.5" text-anchor="middle">(+ 可选 UnigramPLEEmbedding / NGramEmbedding)</text>
  <path d="M580 138 L580 152 L128 152" stroke="#8a6ac0" stroke-width="1.8" fill="none" marker-end="url(#e)"/>
  <text x="300" y="146" fill="#b79ad9" font-size="9.5">展开为 HC 条 lane</text>

  <!-- Decoder layer 0: linear attention -->
  <rect x="180" y="168" width="760" height="150" rx="10" fill="#0d1522" stroke="#33587f"/>
  <text x="200" y="190" fill="#7fb0e6" font-size="13" font-weight="bold">Decoder Layer i  ·  layer_type = linear_attention</text>
  <!-- attn_hc -->
  <rect x="200" y="200" width="340" height="100" rx="7" fill="#120f1c" stroke="#8a6ac0"/>
  <text x="370" y="219" fill="#c0a0e6" font-size="11.5" text-anchor="middle" font-weight="bold">attn_hyper_connection</text>
  <rect x="212" y="228" width="70" height="60" rx="5" fill="#2a1f3a" stroke="#a07ad0"/><text x="247" y="255" fill="#e6d6f5" font-size="10" text-anchor="middle">mix</text><text x="247" y="270" fill="#c0a7d9" font-size="8.5" text-anchor="middle">HC→1</text>
  <rect x="292" y="228" width="150" height="60" rx="5" fill="#1a2a1a" stroke="#5fa85f"/><text x="367" y="252" fill="#cfe6cf" font-size="10.5" text-anchor="middle" font-weight="bold">GatedDeltaNet</text><text x="367" y="268" fill="#8fbf8f" font-size="8.5" text-anchor="middle">线性注意力(GDN)</text>
  <rect x="452" y="228" width="76" height="60" rx="5" fill="#233a2a" stroke="#5fbf8f"/><text x="490" y="255" fill="#cfeeda" font-size="10" text-anchor="middle">combine</text><text x="490" y="270" fill="#8fbf8f" font-size="8.5" text-anchor="middle">1→HC</text>
  <path d="M282 258 L290 258" stroke="#6b7688" stroke-width="1.4" marker-end="url(#g)"/><path d="M442 258 L450 258" stroke="#6b7688" stroke-width="1.4" marker-end="url(#g)"/>
  <!-- mlp_hc -->
  <rect x="570" y="200" width="350" height="100" rx="7" fill="#120f1c" stroke="#8a6ac0"/>
  <text x="745" y="219" fill="#c0a0e6" font-size="11.5" text-anchor="middle" font-weight="bold">mlp_hyper_connection</text>
  <rect x="582" y="228" width="70" height="60" rx="5" fill="#2a1f3a" stroke="#a07ad0"/><text x="617" y="255" fill="#e6d6f5" font-size="10" text-anchor="middle">mix</text><text x="617" y="270" fill="#c0a7d9" font-size="8.5" text-anchor="middle">HC→1</text>
  <rect x="662" y="228" width="158" height="60" rx="5" fill="#1a2a1a" stroke="#5fa85f"/><text x="741" y="250" fill="#cfe6cf" font-size="10.5" text-anchor="middle" font-weight="bold">SparseMoE</text><text x="741" y="266" fill="#8fbf8f" font-size="8.5" text-anchor="middle">shared + routed experts</text>
  <rect x="830" y="228" width="78" height="60" rx="5" fill="#233a2a" stroke="#5fbf8f"/><text x="869" y="255" fill="#cfeeda" font-size="10" text-anchor="middle">combine</text><text x="869" y="270" fill="#8fbf8f" font-size="8.5" text-anchor="middle">(可延迟/融合)</text>
  <path d="M652 258 L660 258" stroke="#6b7688" stroke-width="1.4" marker-end="url(#g)"/><path d="M820 258 L828 258" stroke="#6b7688" stroke-width="1.4" marker-end="url(#g)"/>
  <path d="M540 258 L568 258" stroke="#6b7688" stroke-width="1.6" marker-end="url(#g)"/>
  <!-- lane taps -->
  <path d="M128 240 L198 240" stroke="#8a6ac0" stroke-width="1.5" marker-end="url(#e)"/>
  <path d="M528 300 C 150 330, 128 300, 128 262" stroke="#5fbf8f" stroke-width="1.2" fill="none" stroke-dasharray="3 3" marker-end="url(#c)"/>

  <!-- Decoder layer j: full attention -->
  <rect x="180" y="340" width="760" height="150" rx="10" fill="#0d1522" stroke="#33587f"/>
  <text x="200" y="362" fill="#7fb0e6" font-size="13" font-weight="bold">Decoder Layer j  ·  layer_type = full_attention</text>
  <rect x="200" y="372" width="340" height="100" rx="7" fill="#120f1c" stroke="#8a6ac0"/>
  <text x="370" y="391" fill="#c0a0e6" font-size="11.5" text-anchor="middle" font-weight="bold">attn_hyper_connection</text>
  <rect x="212" y="400" width="70" height="60" rx="5" fill="#2a1f3a" stroke="#a07ad0"/><text x="247" y="427" fill="#e6d6f5" font-size="10" text-anchor="middle">mix</text><text x="247" y="442" fill="#c0a7d9" font-size="8.5" text-anchor="middle">HC→1</text>
  <rect x="292" y="400" width="150" height="60" rx="5" fill="#1a2a1a" stroke="#5fa85f"/><text x="367" y="424" fill="#cfe6cf" font-size="10.5" text-anchor="middle" font-weight="bold">Full Attention</text><text x="367" y="440" fill="#8fbf8f" font-size="8.5" text-anchor="middle">GQA + RoPE</text>
  <rect x="452" y="400" width="76" height="60" rx="5" fill="#233a2a" stroke="#5fbf8f"/><text x="490" y="427" fill="#cfeeda" font-size="10" text-anchor="middle">combine</text><text x="490" y="442" fill="#8fbf8f" font-size="8.5" text-anchor="middle">1→HC</text>
  <path d="M282 430 L290 430" stroke="#6b7688" stroke-width="1.4" marker-end="url(#g)"/><path d="M442 430 L450 430" stroke="#6b7688" stroke-width="1.4" marker-end="url(#g)"/>
  <rect x="570" y="372" width="350" height="100" rx="7" fill="#120f1c" stroke="#8a6ac0"/>
  <text x="745" y="391" fill="#c0a0e6" font-size="11.5" text-anchor="middle" font-weight="bold">mlp_hyper_connection</text>
  <rect x="582" y="400" width="70" height="60" rx="5" fill="#2a1f3a" stroke="#a07ad0"/><text x="617" y="427" fill="#e6d6f5" font-size="10" text-anchor="middle">mix</text>
  <rect x="662" y="400" width="158" height="60" rx="5" fill="#1a2a1a" stroke="#5fa85f"/><text x="741" y="424" fill="#cfe6cf" font-size="10.5" text-anchor="middle" font-weight="bold">SparseMoE</text><text x="741" y="440" fill="#8fbf8f" font-size="8.5" text-anchor="middle">shared + routed</text>
  <rect x="830" y="400" width="78" height="60" rx="5" fill="#233a2a" stroke="#5fbf8f"/><text x="869" y="427" fill="#cfeeda" font-size="10" text-anchor="middle">combine</text>
  <path d="M652 430 L660 430" stroke="#6b7688" stroke-width="1.4" marker-end="url(#g)"/><path d="M820 430 L828 430" stroke="#6b7688" stroke-width="1.4" marker-end="url(#g)"/>
  <path d="M540 430 L568 430" stroke="#6b7688" stroke-width="1.6" marker-end="url(#g)"/>
  <path d="M128 430 L198 430" stroke="#8a6ac0" stroke-width="1.5" marker-end="url(#e)"/>

  <!-- PLE note -->
  <rect x="180" y="504" width="760" height="34" rx="6" fill="#1c1810" stroke="#b08a4a"/>
  <text x="560" y="525" fill="#e0c68f" font-size="10.5" text-anchor="middle">部分层含 PLE（Qwen4Exp2PLELayer，short-conv）：在 HC 的 combine→AG→PLE→mix 内联执行（use_ple + ple_layer_ids）</text>

  <text x="560" y="566" fill="#8a93a6" font-size="20" text-anchor="middle">⋮  （交替堆叠 num_hidden_layers 层，layer_types 决定每层 linear/full）</text>

  <!-- final mixer -> norm -> head -->
  <rect x="180" y="590" width="760" height="120" rx="10" fill="#0d1522" stroke="#33587f"/>
  <rect x="210" y="606" width="220" height="42" rx="6" fill="#2a1f3a" stroke="#a07ad0"/><text x="320" y="626" fill="#e6d6f5" font-size="11" text-anchor="middle" font-weight="bold">hyper_connection_mixer</text><text x="320" y="641" fill="#c0a7d9" font-size="9" text-anchor="middle">HC→1 收束(hc_final_method)</text>
  <path d="M430 627 L470 627" stroke="#6b7688" stroke-width="1.6" marker-end="url(#g)"/>
  <rect x="472" y="606" width="130" height="42" rx="6" fill="#1a2230" stroke="#5a90c0"/><text x="537" y="631" fill="#cfe0f0" font-size="11" text-anchor="middle">Final RMSNorm</text>
  <path d="M602 627 L642 627" stroke="#6b7688" stroke-width="1.6" marker-end="url(#g)"/>
  <rect x="644" y="606" width="130" height="42" rx="6" fill="#1a2230" stroke="#5a90c0"/><text x="709" y="631" fill="#cfe0f0" font-size="11" text-anchor="middle">LM Head</text>
  <path d="M774 627 L814 627" stroke="#6b7688" stroke-width="1.6" marker-end="url(#g)"/>
  <text x="860" y="631" fill="#cfe6cf" font-size="11">logits</text>
  <path d="M128 627 L208 627" stroke="#8a6ac0" stroke-width="1.8" marker-end="url(#e)"/>
  <!-- MTP branch -->
  <rect x="210" y="658" width="560" height="40" rx="6" fill="#1c1420" stroke="#b06ad0"/>
  <text x="490" y="682" fill="#e0b8f0" font-size="10.5" text-anchor="middle">MTP drafter（投机解码）：消费"末层前的多流残差 [T, HC×HS]"作为多流 backbone（mtp_hc, hc_count&gt;1）</text>
  <path d="M320 648 L320 656" stroke="#b06ad0" stroke-width="1.4" stroke-dasharray="3 2" marker-end="url(#m)"/>

  <!-- flow down arrows between layers -->
  <g stroke="#8a6ac0" stroke-width="2" fill="none" marker-end="url(#e)">
    <path d="M105 318 L105 340"/>
    <path d="M105 538 L105 560"/>
    <path d="M105 578 L105 590"/>
  </g>

  <!-- right proof box -->
  <rect x="960" y="168" width="200" height="330" rx="10" fill="#101816" stroke="#4a6a5a"/>
  <text x="976" y="190" fill="#8fe0b8" font-size="12" font-weight="bold">证明: HC 是训练出来的</text>
  <text x="976" y="212" fill="#a9d6c0" font-size="9.5">来自 checkpoint config:</text>
  <text x="976" y="230" fill="#c9e6d6" font-size="9.5">· use_hc = True</text>
  <text x="976" y="246" fill="#c9e6d6" font-size="9.5">· hc_count (默认4)</text>
  <text x="976" y="262" fill="#c9e6d6" font-size="9.5">· hc_method</text>
  <text x="976" y="278" fill="#c9e6d6" font-size="9.5">· hc_lowrank (128)</text>
  <text x="976" y="294" fill="#c9e6d6" font-size="9.5">· hc_final_method</text>
  <text x="976" y="310" fill="#c9e6d6" font-size="9.5">· mtp_hc / layer_types</text>
  <text x="976" y="334" fill="#a9d6c0" font-size="9.5">checkpoint 权重(可学习):</text>
  <text x="976" y="352" fill="#c9e6d6" font-size="9">· input_mix_weight_down</text>
  <text x="976" y="368" fill="#c9e6d6" font-size="9">· input_mix_weight_up</text>
  <text x="976" y="384" fill="#c9e6d6" font-size="9">· block_inject_weight</text>
  <text x="976" y="400" fill="#c9e6d6" font-size="9">· hc_norm</text>
  <text x="976" y="424" fill="#8a93a6" font-size="9">每层 2 个 HC 模块:</text>
  <text x="976" y="440" fill="#8a93a6" font-size="9">attn_/mlp_hyper_connection</text>
  <text x="976" y="462" fill="#8a93a6" font-size="9">→ 端到端预训练,</text>
  <text x="976" y="477" fill="#8a93a6" font-size="9">vLLM 仅加载+执行</text>

  <text x="590" y="720" fill="#8a93a6" font-size="10" text-anchor="middle">代码: Qwen4Exp2Model(:3104) / DecoderLayer(:2650, HC 实例化 :2788) / SparseMoE(:1909) / GatedDeltaNet(:2035) / Attention(:2525) / 末层 mixer(:3215)</text>

  <defs>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#6b7688"/></marker>
    <marker id="e" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#8a6ac0"/></marker>
    <marker id="c" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#5fbf8f"/></marker>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#b06ad0"/></marker>
  </defs>
</svg>
