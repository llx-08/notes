<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" font-family="Menlo,Consolas,monospace">
  <rect width="960" height="560" fill="#0f1117"/>
  <text x="480" y="34" fill="#e6e6e6" font-size="20" text-anchor="middle" font-weight="bold">GR / HyperConnection — 残差高速公路 (HC=4 示例)</text>
  <text x="480" y="56" fill="#8a93a6" font-size="13" text-anchor="middle">隐状态宽度 = HC × HS（HC 条并行残差 lane，HS 为原 hidden_size）; layout [*, HC, HS] HS 内, HC 外</text>

  <!-- incoming HC lanes -->
  <g>
    <text x="70" y="120" fill="#8a93a6" font-size="12" text-anchor="middle">hyper_input</text>
    <text x="70" y="136" fill="#8a93a6" font-size="12" text-anchor="middle">[T, HC*HS]</text>
    <rect x="30" y="150" width="80" height="30" rx="4" fill="#1d3a5f" stroke="#4a90d9"/>
    <text x="70" y="170" fill="#cfe3ff" font-size="12" text-anchor="middle">lane 0</text>
    <rect x="30" y="190" width="80" height="30" rx="4" fill="#1d3a5f" stroke="#4a90d9"/>
    <text x="70" y="210" fill="#cfe3ff" font-size="12" text-anchor="middle">lane 1</text>
    <rect x="30" y="230" width="80" height="30" rx="4" fill="#1d3a5f" stroke="#4a90d9"/>
    <text x="70" y="250" fill="#cfe3ff" font-size="12" text-anchor="middle">lane 2</text>
    <rect x="30" y="270" width="80" height="30" rx="4" fill="#1d3a5f" stroke="#4a90d9"/>
    <text x="70" y="290" fill="#cfe3ff" font-size="12" text-anchor="middle">lane 3</text>
  </g>

  <!-- mix box -->
  <rect x="180" y="150" width="180" height="150" rx="8" fill="#14243a" stroke="#4a90d9" stroke-width="2"/>
  <text x="270" y="176" fill="#e6e6e6" font-size="15" text-anchor="middle" font-weight="bold">mix()</text>
  <text x="270" y="200" fill="#b8c2d6" font-size="11.5" text-anchor="middle">1. RMSNorm(每 lane)</text>
  <text x="270" y="220" fill="#b8c2d6" font-size="11.5" text-anchor="middle">2. down: HC*HS→K</text>
  <text x="270" y="240" fill="#b8c2d6" font-size="11.5" text-anchor="middle">3. up: K→HC*HS</text>
  <text x="270" y="260" fill="#b8c2d6" font-size="11.5" text-anchor="middle">4. GSM: gate=σ(·)</text>
  <text x="270" y="280" fill="#b8c2d6" font-size="11.5" text-anchor="middle">   out=mean_c(gate·h)</text>

  <!-- arrows lanes -> mix -->
  <g stroke="#4a90d9" stroke-width="1.6" fill="none" marker-end="url(#ar)">
    <path d="M110 165 L178 200"/>
    <path d="M110 205 L178 215"/>
    <path d="M110 245 L178 235"/>
    <path d="M110 285 L178 250"/>
  </g>

  <!-- mixed input single HS -->
  <rect x="410" y="205" width="90" height="40" rx="4" fill="#3a2f14" stroke="#d9a94a"/>
  <text x="455" y="222" fill="#ffe9c0" font-size="12" text-anchor="middle">mixed_in</text>
  <text x="455" y="238" fill="#ffe9c0" font-size="11" text-anchor="middle">[T, HS]</text>
  <path d="M360 225 L408 225" stroke="#d9a94a" stroke-width="1.8" fill="none" marker-end="url(#ar2)"/>

  <!-- block -->
  <rect x="540" y="185" width="130" height="80" rx="8" fill="#1a2a1a" stroke="#5fa85f" stroke-width="2"/>
  <text x="605" y="218" fill="#e6e6e6" font-size="14" text-anchor="middle" font-weight="bold">Attn / MLP</text>
  <text x="605" y="240" fill="#a9d6a9" font-size="11" text-anchor="middle">(block, 单流 HS)</text>
  <path d="M500 225 L538 225" stroke="#d9a94a" stroke-width="1.8" fill="none" marker-end="url(#ar2)"/>

  <!-- block output -->
  <rect x="700" y="205" width="90" height="40" rx="4" fill="#3a2f14" stroke="#d9a94a"/>
  <text x="745" y="222" fill="#ffe9c0" font-size="12" text-anchor="middle">block_out</text>
  <text x="745" y="238" fill="#ffe9c0" font-size="11" text-anchor="middle">[T, HS]</text>
  <path d="M670 225 L698 225" stroke="#d9a94a" stroke-width="1.8" fill="none" marker-end="url(#ar2)"/>

  <!-- combine box -->
  <rect x="700" y="300" width="180" height="120" rx="8" fill="#14243a" stroke="#4a90d9" stroke-width="2"/>
  <text x="790" y="326" fill="#e6e6e6" font-size="15" text-anchor="middle" font-weight="bold">combine()</text>
  <text x="790" y="350" fill="#b8c2d6" font-size="11.5" text-anchor="middle">residual +</text>
  <text x="790" y="370" fill="#b8c2d6" font-size="11.5" text-anchor="middle">outer(iw_scaled,</text>
  <text x="790" y="388" fill="#b8c2d6" font-size="11.5" text-anchor="middle">      block_out)</text>
  <text x="790" y="408" fill="#7fa7d9" font-size="10.5" text-anchor="middle">每 lane 独立注入门控</text>
  <path d="M745 245 L745 298" stroke="#d9a94a" stroke-width="1.8" fill="none" marker-end="url(#ar2)"/>

  <!-- iw_scaled aux from mix to combine -->
  <path d="M270 300 C 270 470, 790 470, 790 422" stroke="#c060c0" stroke-width="1.6" fill="none" stroke-dasharray="6 4" marker-end="url(#ar3)"/>
  <text x="530" y="486" fill="#d98ad9" font-size="11.5" text-anchor="middle">mix_aux = iw_scaled = 2σ(inject_w / HC)  [T, HC]  （mix 预先算好，喂给配对的 combine）</text>

  <!-- residual highway (skip) from input to combine -->
  <path d="M70 320 C 70 520, 620 520, 700 400" stroke="#4a90d9" stroke-width="1.6" fill="none" stroke-dasharray="3 3" marker-end="url(#ar)"/>
  <text x="360" y="536" fill="#7fa7d9" font-size="11.5" text-anchor="middle">residual (= 原始 HC lanes, 直连) [T, HC*HS]</text>

  <!-- output lanes -->
  <rect x="905" y="330" width="40" height="60" rx="4" fill="#1d3a5f" stroke="#4a90d9"/>
  <text x="925" y="364" fill="#cfe3ff" font-size="11" text-anchor="middle" transform="rotate(90 925 364)">HC lanes out</text>
  <path d="M880 360 L903 360" stroke="#4a90d9" stroke-width="1.8" fill="none" marker-end="url(#ar)"/>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#4a90d9"/></marker>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#d9a94a"/></marker>
    <marker id="ar3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#c060c0"/></marker>
  </defs>
</svg>
