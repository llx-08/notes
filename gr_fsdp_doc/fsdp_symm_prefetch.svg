<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="720" viewBox="0 0 1060 720" font-family="Menlo,Consolas,monospace">
  <rect width="1060" height="720" fill="#0f1117"/>
  <text x="530" y="32" fill="#e6e6e6" font-size="20" text-anchor="middle" font-weight="bold">FSDP —— 对称内存(symmetric memory) 按层分片 + GPU 间 P2P 双缓冲预取</text>
  <text x="530" y="54" fill="#8a93a6" font-size="12.5" text-anchor="middle">MoE 专家权重按层分给 DP 组各卡：layer i 属主 = i % dp_size；示例 dp_size=2，走 NVLink/C2C（不走 PCIe/CPU）</text>

  <!-- ===== memory layout: 2 GPUs ===== -->
  <text x="40" y="88" fill="#b8c2d6" font-size="13" font-weight="bold">① 显存布局（一份权重摊到 2 张卡）</text>

  <!-- GPU0 -->
  <rect x="60" y="100" width="380" height="180" rx="10" fill="#101c14" stroke="#5fa85f" stroke-width="1.6"/>
  <text x="80" y="122" fill="#8fd68f" font-size="13" font-weight="bold">GPU0  (dp_rank 0)</text>
  <rect x="76" y="132" width="200" height="88" rx="6" fill="#14241a" stroke="#5fa85f"/>
  <text x="176" y="150" fill="#cfe6cf" font-size="11" text-anchor="middle" font-weight="bold">对称内存(属主层 0/2/4)</text>
  <rect x="86" y="158" width="180" height="16" rx="3" fill="#1d3a24"/><text x="176" y="170" fill="#a9d6a9" font-size="9.5" text-anchor="middle">L0 experts (w13/w2)</text>
  <rect x="86" y="178" width="180" height="16" rx="3" fill="#1d3a24"/><text x="176" y="190" fill="#a9d6a9" font-size="9.5" text-anchor="middle">L2 experts</text>
  <rect x="86" y="198" width="180" height="16" rx="3" fill="#1d3a24"/><text x="176" y="210" fill="#a9d6a9" font-size="9.5" text-anchor="middle">L4 experts</text>
  <rect x="288" y="132" width="140" height="88" rx="6" fill="#241c10" stroke="#d9a94a"/>
  <text x="358" y="150" fill="#f0c878" font-size="11" text-anchor="middle" font-weight="bold">轮转 buffer ×4</text>
  <rect x="298" y="158" width="120" height="14" rx="3" fill="#3a2c14"/><text x="358" y="169" fill="#e0c68f" font-size="9" text-anchor="middle">buf0</text>
  <rect x="298" y="176" width="120" height="14" rx="3" fill="#3a2c14"/><text x="358" y="187" fill="#e0c68f" font-size="9" text-anchor="middle">buf1</text>
  <rect x="298" y="194" width="120" height="14" rx="3" fill="#3a2c14"/><text x="358" y="205" fill="#e0c68f" font-size="9" text-anchor="middle">buf2/3 …</text>
  <text x="250" y="244" fill="#8a93a6" font-size="10" text-anchor="middle">非属主层(1/3/5)不常驻整份权重，</text>
  <text x="250" y="260" fill="#8a93a6" font-size="10" text-anchor="middle">用到时预取进 buffer 复用</text>

  <!-- GPU1 -->
  <rect x="620" y="100" width="380" height="180" rx="10" fill="#101c14" stroke="#5fa85f" stroke-width="1.6"/>
  <text x="640" y="122" fill="#8fd68f" font-size="13" font-weight="bold">GPU1  (dp_rank 1)</text>
  <rect x="744" y="132" width="200" height="88" rx="6" fill="#14241a" stroke="#5fa85f"/>
  <text x="844" y="150" fill="#cfe6cf" font-size="11" text-anchor="middle" font-weight="bold">对称内存(属主层 1/3/5)</text>
  <rect x="754" y="158" width="180" height="16" rx="3" fill="#1d3a24"/><text x="844" y="170" fill="#a9d6a9" font-size="9.5" text-anchor="middle">L1 experts (w13/w2)</text>
  <rect x="754" y="178" width="180" height="16" rx="3" fill="#1d3a24"/><text x="844" y="190" fill="#a9d6a9" font-size="9.5" text-anchor="middle">L3 experts</text>
  <rect x="754" y="198" width="180" height="16" rx="3" fill="#1d3a24"/><text x="844" y="210" fill="#a9d6a9" font-size="9.5" text-anchor="middle">L5 experts</text>
  <rect x="632" y="132" width="100" height="88" rx="6" fill="#241c10" stroke="#d9a94a"/>
  <text x="682" y="150" fill="#f0c878" font-size="10.5" text-anchor="middle" font-weight="bold">buffer ×4</text>
  <rect x="640" y="158" width="84" height="14" rx="3" fill="#3a2c14"/><text x="682" y="169" fill="#e0c68f" font-size="9" text-anchor="middle">buf0</text>
  <rect x="640" y="176" width="84" height="14" rx="3" fill="#3a2c14"/><text x="682" y="187" fill="#e0c68f" font-size="9" text-anchor="middle">buf1…</text>

  <!-- NVLink -->
  <rect x="450" y="150" width="160" height="52" rx="8" fill="#1a1526" stroke="#8a6ac0" stroke-width="1.6"/>
  <text x="530" y="172" fill="#c0a0e6" font-size="12" text-anchor="middle" font-weight="bold">NVLink / C2C</text>
  <text x="530" y="190" fill="#a78ad0" font-size="10" text-anchor="middle">symm_mem P2P</text>
  <path d="M440 176 L448 176" stroke="#8a6ac0" stroke-width="2" marker-end="url(#p)"/>
  <path d="M620 176 L612 176" stroke="#8a6ac0" stroke-width="2" marker-end="url(#p)"/>
  <text x="530" y="228" fill="#9a7fd9" font-size="10" text-anchor="middle">get_buffer(dst_pe) 直接读 peer 显存</text>
  <text x="530" y="244" fill="#9a7fd9" font-size="10" text-anchor="middle">dst_pe=(layer%dp)*tp+tp_rank</text>

  <!-- ===== timeline for GPU0 ===== -->
  <text x="40" y="322" fill="#b8c2d6" font-size="13" font-weight="bold">② GPU0 前向时间线（fsdp_context 每层：等权重→算→记事件→预取下一远端层）</text>

  <!-- compute stream -->
  <text x="40" y="366" fill="#8a93a6" font-size="12" font-weight="bold">compute</text>
  <text x="40" y="380" fill="#8a93a6" font-size="12" font-weight="bold">stream</text>
  <g font-size="11">
    <rect x="150" y="352" width="120" height="44" rx="5" fill="#14241a" stroke="#5fa85f"/><text x="210" y="372" fill="#e6e6e6" text-anchor="middle">L0 (本地)</text><text x="210" y="388" fill="#8fbf8f" text-anchor="middle">属主, 直接算</text>
    <rect x="290" y="352" width="120" height="44" rx="5" fill="#241c1c" stroke="#d95f5f"/><text x="350" y="372" fill="#ffd0d0" text-anchor="middle">L1 (远端)</text><text x="350" y="388" fill="#e0a0a0" text-anchor="middle">用 buf(已预取)</text>
    <rect x="430" y="352" width="120" height="44" rx="5" fill="#14241a" stroke="#5fa85f"/><text x="490" y="372" fill="#e6e6e6" text-anchor="middle">L2 (本地)</text><text x="490" y="388" fill="#8fbf8f" text-anchor="middle">属主</text>
    <rect x="570" y="352" width="120" height="44" rx="5" fill="#241c1c" stroke="#d95f5f"/><text x="630" y="372" fill="#ffd0d0" text-anchor="middle">L3 (远端)</text><text x="630" y="388" fill="#e0a0a0" text-anchor="middle">用 buf</text>
    <rect x="710" y="352" width="120" height="44" rx="5" fill="#14241a" stroke="#5fa85f"/><text x="770" y="372" fill="#e6e6e6" text-anchor="middle">L4 (本地)</text>
    <rect x="850" y="352" width="120" height="44" rx="5" fill="#241c1c" stroke="#d95f5f"/><text x="910" y="372" fill="#ffd0d0" text-anchor="middle">L5 (远端)</text>
  </g>

  <!-- copy stream -->
  <text x="40" y="470" fill="#8a93a6" font-size="12" font-weight="bold">copy</text>
  <text x="40" y="484" fill="#8a93a6" font-size="12" font-weight="bold">stream(P2P)</text>
  <g font-size="10.5">
    <rect x="150" y="456" width="120" height="44" rx="5" fill="#1a1526" stroke="#8a6ac0"/><text x="210" y="476" fill="#e6d6f5" text-anchor="middle">预取 L1</text><text x="210" y="491" fill="#c0a7d9" text-anchor="middle">←GPU1 symm</text>
    <rect x="290" y="456" width="120" height="44" rx="5" fill="#1a1526" stroke="#8a6ac0"/><text x="350" y="476" fill="#e6d6f5" text-anchor="middle">预取 L3</text><text x="350" y="491" fill="#c0a7d9" text-anchor="middle">←GPU1</text>
    <rect x="570" y="456" width="120" height="44" rx="5" fill="#1a1526" stroke="#8a6ac0"/><text x="630" y="476" fill="#e6d6f5" text-anchor="middle">预取 L5</text><text x="630" y="491" fill="#c0a7d9" text-anchor="middle">←GPU1</text>
  </g>

  <!-- overlap arrows: compute Li triggers prefetch of next remote -->
  <g stroke="#c060c0" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#p)">
    <path d="M210 396 L210 454"/>
    <path d="M490 396 C 560 420, 600 430, 630 454"/>
    <path d="M770 396 C 700 420, 660 430, 630 454"/>
  </g>
  <!-- buffer ready feeds compute -->
  <g stroke="#8a6ac0" stroke-width="1.4" fill="none" marker-end="url(#p2)">
    <path d="M210 456 C 250 430, 300 420, 350 398"/>
  </g>
  <text x="530" y="524" fill="#c090d0" font-size="10.5" text-anchor="middle">算本地层的同时，copy_stream 通过 NVLink 预取后面"远端层"进 buffer；events(copy/comp) 串接，传输被计算掩盖</text>

  <!-- fsdp_context steps -->
  <rect x="150" y="548" width="820" height="70" rx="8" fill="#12161e" stroke="#333b4d"/>
  <text x="166" y="570" fill="#b8c2d6" font-size="11.5" font-weight="bold">fsdp_context(layer) 四步 (stream_controller.py:135)</text>
  <text x="166" y="590" fill="#9fb0c6" font-size="10.5">① copy_events[buf].wait() 等权重到位  →  ② yield 跑 MoE(gemm1/gemm2)  →</text>
  <text x="166" y="608" fill="#9fb0c6" font-size="10.5">③ comp_events[buf].record() 标记算完(buf 可覆盖)  →  ④ prefetch_next_data(): copy_stream 上 buffer.copy_(peer_symm)</text>

  <!-- benefit note -->
  <rect x="60" y="636" width="940" height="64" rx="8" fill="#141018" stroke="#5a4a6a"/>
  <text x="76" y="658" fill="#d0b8e0" font-size="11.5" font-weight="bold">收益：每卡只常驻 1/dp_size 专家权重 → 省下的 HBM 给 KV cache（更大 batch/更长 context/更高吞吐）或更大模型</text>
  <text x="76" y="678" fill="#a998b8" font-size="10.5">vs 全量进显存：不提速(有跨卡流量)，是"用 NVLink 带宽换显存容量"；能否零损耗取决于 单层 MoE 计算 ≥ 单层 P2P 传输</text>
  <text x="76" y="694" fill="#a998b8" font-size="10.5">vs CPU offload：带宽高一个数量级(NVLink/C2C 数百 GB/s~TB/s vs PCIe ~64GB/s)，更易掩盖、延迟更低</text>

  <defs>
    <marker id="p" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#8a6ac0"/></marker>
    <marker id="p2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#8a6ac0"/></marker>
  </defs>
</svg>
