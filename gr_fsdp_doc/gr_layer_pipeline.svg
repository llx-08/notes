<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="Menlo,Consolas,monospace">
  <rect width="1000" height="470" fill="#0f1117"/>
  <text x="500" y="32" fill="#e6e6e6" font-size="20" text-anchor="middle" font-weight="bold">GR 解码层流水线 (TPSP: 序列并行变体)</text>
  <text x="500" y="54" fill="#8a93a6" font-size="12.5" text-anchor="middle">use_hc=True 时 TP 的 AllReduce 被 ReduceScatter + AllGather 替代; mix/combine 只在本 rank 的 T/tp 个 token 上跑</text>

  <!-- token-dim legend -->
  <rect x="720" y="70" width="260" height="52" rx="6" fill="#161a22" stroke="#333b4d"/>
  <text x="732" y="90" fill="#8a93a6" font-size="11">■ 本地 T_local = T/tp  (残差常驻, 不通信)</text>
  <rect x="726" y="82" width="10" height="10" fill="#2f5d8a"/>
  <text x="732" y="110" fill="#8a93a6" font-size="11">■ 全局 T  (Attn/MLP 需要完整序列)</text>
  <rect x="726" y="102" width="10" height="10" fill="#5fa85f"/>

  <!-- pipeline steps -->
  <g font-size="12">
    <!-- enter mix -->
    <rect x="30" y="160" width="110" height="60" rx="6" fill="#14243a" stroke="#4a90d9"/>
    <text x="85" y="185" fill="#e6e6e6" text-anchor="middle" font-weight="bold">enter-mix</text>
    <text x="85" y="205" fill="#7fa7d9" text-anchor="middle">[T_local,HC*HS]</text>

    <rect x="170" y="160" width="70" height="60" rx="6" fill="#2a2440" stroke="#9a7fd9"/>
    <text x="205" y="188" fill="#e6e6e6" text-anchor="middle" font-weight="bold">AG</text>
    <text x="205" y="206" fill="#c7b8f0" text-anchor="middle">→ T</text>

    <rect x="270" y="160" width="110" height="60" rx="6" fill="#1a2a1a" stroke="#5fa85f"/>
    <text x="325" y="185" fill="#e6e6e6" text-anchor="middle" font-weight="bold">Attn</text>
    <text x="325" y="205" fill="#a9d6a9" text-anchor="middle">[T, H]</text>

    <rect x="410" y="160" width="70" height="60" rx="6" fill="#2a2440" stroke="#9a7fd9"/>
    <text x="445" y="188" fill="#e6e6e6" text-anchor="middle" font-weight="bold">RS</text>
    <text x="445" y="206" fill="#c7b8f0" text-anchor="middle">→ T_local</text>

    <rect x="510" y="150" width="150" height="80" rx="6" fill="#14243a" stroke="#4a90d9" stroke-width="2"/>
    <text x="585" y="174" fill="#e6e6e6" text-anchor="middle" font-weight="bold">combine+mlp_mix</text>
    <text x="585" y="192" fill="#7fa7d9" text-anchor="middle">(fused)</text>
    <text x="585" y="212" fill="#7fa7d9" text-anchor="middle">attn_out 注入残差</text>
    <text x="585" y="226" fill="#7fa7d9" text-anchor="middle">→ mlp 输入</text>

    <rect x="690" y="160" width="70" height="60" rx="6" fill="#2a2440" stroke="#9a7fd9"/>
    <text x="725" y="188" fill="#e6e6e6" text-anchor="middle" font-weight="bold">AG</text>
    <text x="725" y="206" fill="#c7b8f0" text-anchor="middle">→ T</text>

    <rect x="790" y="160" width="110" height="60" rx="6" fill="#1a2a1a" stroke="#5fa85f"/>
    <text x="845" y="185" fill="#e6e6e6" text-anchor="middle" font-weight="bold">MLP / MoE</text>
    <text x="845" y="205" fill="#a9d6a9" text-anchor="middle">[T, H]</text>

    <rect x="790" y="270" width="110" height="60" rx="6" fill="#2a2440" stroke="#9a7fd9"/>
    <text x="845" y="298" fill="#e6e6e6" text-anchor="middle" font-weight="bold">RS</text>
    <text x="845" y="316" fill="#c7b8f0" text-anchor="middle">→ T_local</text>
  </g>

  <!-- arrows -->
  <g stroke="#6b7688" stroke-width="1.8" fill="none" marker-end="url(#a)">
    <path d="M140 190 L168 190"/>
    <path d="M240 190 L268 190"/>
    <path d="M380 190 L408 190"/>
    <path d="M480 190 L508 190"/>
    <path d="M660 190 L688 190"/>
    <path d="M760 190 L788 190"/>
    <path d="M845 220 L845 268"/>
  </g>

  <!-- defer arrow to next layer -->
  <rect x="470" y="360" width="330" height="70" rx="8" fill="#3a1414" stroke="#d95f5f" stroke-width="2"/>
  <text x="635" y="386" fill="#ffd0d0" font-size="13" text-anchor="middle" font-weight="bold">deferred residual → 下一层</text>
  <text x="635" y="406" fill="#e0a0a0" font-size="11" text-anchor="middle">返回 (mlp_out, residual, inject_w); MLP 的 combine 不在本层做,</text>
  <text x="635" y="422" fill="#e0a0a0" font-size="11" text-anchor="middle">推迟到下一层起始, 与下一层 attn 的 mix 融合 (combine_and_mix_fused)</text>
  <path d="M845 330 C 845 348, 720 352, 700 358" stroke="#d95f5f" stroke-width="1.8" fill="none" marker-end="url(#a2)"/>
  <path d="M470 395 C 300 395, 85 320, 85 222" stroke="#d95f5f" stroke-width="1.6" fill="none" stroke-dasharray="6 4" marker-end="url(#a2)"/>
  <text x="250" y="300" fill="#e0a0a0" font-size="11" text-anchor="middle">下一层 enter 处 = combine(上层 mlp)+本层 attn mix</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#6b7688"/></marker>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#d95f5f"/></marker>
  </defs>
</svg>
