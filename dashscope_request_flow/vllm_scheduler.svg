<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" font-family="Menlo,Consolas,monospace">
  <rect width="1080" height="640" fill="#0f1117"/>
  <text x="540" y="32" fill="#e6e6e6" font-size="20" text-anchor="middle" font-weight="bold">vLLM v1 引擎调度 — waiting / running 队列与准入 (scheduler.py)</text>
  <text x="540" y="54" fill="#8a93a6" font-size="12" text-anchor="middle">dashllm 后台线程循环调用 engine.step(); 每 step = 一次 schedule() + 一次 forward + 输出解复用</text>

  <!-- input -->
  <rect x="40" y="86" width="220" height="44" rx="6" fill="#241c10" stroke="#d9a94a"/>
  <text x="150" y="106" fill="#f0c878" font-size="12" text-anchor="middle">dashllm _input_queue</text>
  <text x="150" y="122" fill="#d9b87f" font-size="10" text-anchor="middle">add_request(req_id, prompt_ids, params)</text>
  <path d="M260 108 L300 108" stroke="#6b7688" stroke-width="2" marker-end="url(#a)"/>

  <!-- waiting queue -->
  <rect x="300" y="80" width="240" height="120" rx="8" fill="#2a1414" stroke="#d95f5f" stroke-width="2"/>
  <text x="420" y="102" fill="#ffd0d0" font-size="13" text-anchor="middle" font-weight="bold">waiting 队列</text>
  <text x="420" y="122" fill="#e0a0a0" font-size="10" text-anchor="middle">policy 排序 (FCFS/priority)</text>
  <g>
    <rect x="316" y="132" width="208" height="18" rx="3" fill="#3a1c1c"/><text x="420" y="145" fill="#f0c0c0" font-size="9.5" text-anchor="middle">req (num_computed &lt; num_tokens)</text>
    <rect x="316" y="154" width="208" height="18" rx="3" fill="#3a1c1c"/><text x="420" y="167" fill="#f0c0c0" font-size="9.5" text-anchor="middle">req · WAITING_FOR_REMOTE_KVS (PD 消费端)</text>
    <rect x="316" y="176" width="208" height="18" rx="3" fill="#3a1c1c"/><text x="420" y="189" fill="#f0c0c0" font-size="9.5" text-anchor="middle">req · WAITING_FOR_FSM ...</text>
  </g>

  <!-- schedule box -->
  <rect x="600" y="80" width="440" height="300" rx="8" fill="#161a22" stroke="#d95f5f"/>
  <text x="820" y="104" fill="#f09a9a" font-size="13" text-anchor="middle" font-weight="bold">schedule()  每 step 一次</text>

  <rect x="620" y="118" width="400" height="80" rx="6" fill="#1e2430" stroke="#5a90c0"/>
  <text x="820" y="138" fill="#cfe0f0" font-size="11.5" text-anchor="middle" font-weight="bold">A. 先调度 RUNNING</text>
  <text x="820" y="156" fill="#a9c6e0" font-size="10" text-anchor="middle">给在跑请求分配新 token (decode / 续 prefill)</text>
  <text x="820" y="172" fill="#a9c6e0" font-size="10" text-anchor="middle">受 token_budget = max_num_batched_tokens 限制</text>
  <text x="820" y="188" fill="#ffb0b0" font-size="10" text-anchor="middle">allocate_slots 失败 → 抢占最低优先级回 waiting</text>

  <rect x="620" y="206" width="400" height="96" rx="6" fill="#1e2430" stroke="#5a90c0"/>
  <text x="820" y="226" fill="#cfe0f0" font-size="11.5" text-anchor="middle" font-weight="bold">B. 再准入 WAITING（循环直到不满足）</text>
  <text x="820" y="244" fill="#a9c6e0" font-size="10" text-anchor="middle">① len(running) &lt; max_num_seqs ?</text>
  <text x="820" y="260" fill="#a9c6e0" font-size="10" text-anchor="middle">② 前缀缓存/外部KV 命中 → 减少 num_new_tokens</text>
  <text x="820" y="276" fill="#a9c6e0" font-size="10" text-anchor="middle">③ token_budget 够 ? (否则 chunked 或 break)</text>
  <text x="820" y="292" fill="#ffb0b0" font-size="10" text-anchor="middle">④ allocate_slots (KV block) 成功 ? 否 → break(背压)</text>

  <rect x="620" y="310" width="400" height="56" rx="6" fill="#1a2a1a" stroke="#5fa85f"/>
  <text x="820" y="330" fill="#cfe6cf" font-size="11.5" text-anchor="middle" font-weight="bold">C. 组 batch → 模型 forward → 采样</text>
  <text x="820" y="348" fill="#a9d6a9" font-size="10" text-anchor="middle">无 prefill/decode 阶段之分: 按 num_computed_tokens 缺口补</text>
  <text x="820" y="362" fill="#a9d6a9" font-size="10" text-anchor="middle">chunked prefill / speculative decode 天然覆盖</text>

  <!-- arrows waiting->schedule -->
  <path d="M540 140 C 570 140, 580 250, 618 250" stroke="#d95f5f" stroke-width="1.8" fill="none" marker-end="url(#a2)"/>
  <text x="575" y="205" fill="#e0a0a0" font-size="9.5" text-anchor="middle">准入</text>
  <!-- preempt back -->
  <path d="M618 190 C 575 190, 560 165, 542 160" stroke="#d98a4a" stroke-width="1.6" fill="none" stroke-dasharray="5 3" marker-end="url(#a3)"/>
  <text x="575" y="176" fill="#d9a97a" font-size="9" text-anchor="middle">抢占回退</text>

  <!-- running set -->
  <rect x="300" y="250" width="240" height="120" rx="8" fill="#2a1414" stroke="#d95f5f" stroke-width="2"/>
  <text x="420" y="272" fill="#ffd0d0" font-size="13" text-anchor="middle" font-weight="bold">running 集合</text>
  <text x="420" y="292" fill="#e0a0a0" font-size="10" text-anchor="middle">上限 max_num_seqs</text>
  <g>
    <rect x="316" y="302" width="208" height="16" rx="3" fill="#3a1c1c"/><text x="420" y="314" fill="#f0c0c0" font-size="9.5" text-anchor="middle">req (逐 step 产 1 token)</text>
    <rect x="316" y="322" width="208" height="16" rx="3" fill="#3a1c1c"/><text x="420" y="334" fill="#f0c0c0" font-size="9.5" text-anchor="middle">req ...</text>
    <rect x="316" y="342" width="208" height="16" rx="3" fill="#3a1c1c"/><text x="420" y="354" fill="#f0c0c0" font-size="9.5" text-anchor="middle">req ...</text>
  </g>
  <path d="M540 300 C 575 300, 585 155, 618 155" stroke="#d95f5f" stroke-width="1.6" fill="none" stroke-dasharray="4 3" marker-end="url(#a2)"/>

  <!-- outputs -->
  <rect x="300" y="410" width="740" height="66" rx="8" fill="#241c10" stroke="#d9a94a"/>
  <text x="670" y="432" fill="#f0c878" font-size="12" text-anchor="middle" font-weight="bold">输出: 每 step 的 token 按 request_id 解复用 → dashllm output_queue_map → 逐层流式上行</text>
  <text x="670" y="452" fill="#d9b87f" font-size="10" text-anchor="middle">请求完成 (EOS/max_tokens) → 移出 running; PD: 消费端在 KV 到达后才进入 running</text>
  <text x="670" y="468" fill="#8a93a6" font-size="9.5" text-anchor="middle">(分支 support_p_tp_lt_d_tp 另有 schedule_with_preempt(): chunk 级抢占 / prefill binpacking, 由配置开关选择)</text>
  <path d="M820 366 L820 408" stroke="#5fa85f" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- budgets legend -->
  <rect x="40" y="500" width="1000" height="110" rx="8" fill="#12161e" stroke="#333b4d"/>
  <text x="56" y="522" fill="#b8c2d6" font-size="12" font-weight="bold">关键准入/背压参数</text>
  <text x="56" y="544" fill="#9fb0c6" font-size="10.5">• max_num_seqs → running 并发上限 (max_num_running_reqs)</text>
  <text x="56" y="562" fill="#9fb0c6" font-size="10.5">• max_num_batched_tokens → 每 step token 预算 (token_budget)</text>
  <text x="56" y="580" fill="#9fb0c6" font-size="10.5">• KV-cache block 池 → allocate_slots 失败即背压(waiting 滞留 / 抢占)</text>
  <text x="560" y="544" fill="#9fb0c6" font-size="10.5">• long_prefill_token_threshold → chunked prefill 分块</text>
  <text x="560" y="562" fill="#9fb0c6" font-size="10.5">• 前缀缓存 / 外部 KV 命中 → 减少需算 token</text>
  <text x="560" y="580" fill="#9fb0c6" font-size="10.5">• PD: WAITING_FOR_REMOTE_KVS 直到 KV 传输(KVT)完成</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#6b7688"/></marker>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#d95f5f"/></marker>
    <marker id="a3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#d98a4a"/></marker>
    <marker id="a4" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#5fa85f"/></marker>
  </defs>
</svg>
