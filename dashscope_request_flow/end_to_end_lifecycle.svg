<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="900" viewBox="0 0 1180 900" font-family="Menlo,Consolas,monospace">
  <rect width="1180" height="900" fill="#0f1117"/>
  <text x="590" y="34" fill="#e6e6e6" font-size="21" text-anchor="middle" font-weight="bold">DashScope 推理请求 端到端生命周期</text>
  <text x="590" y="56" fill="#8a93a6" font-size="12.5" text-anchor="middle">client → dashscope-platform(网关) → Turbo/全局批调度 → dashscope-serving → dashllm → vLLM 引擎</text>
  <text x="590" y="74" fill="#c060c0" font-size="12" text-anchor="middle">◆ = 排队 / 准入 / 限流点（详见 queuing_points.svg）</text>

  <!-- Client -->
  <rect x="470" y="92" width="240" height="42" rx="6" fill="#22262e" stroke="#6b7688"/>
  <text x="590" y="118" fill="#e6e6e6" font-size="13" text-anchor="middle">Client — HTTP / gRPC / WebSocket</text>
  <path d="M590 134 L590 158" stroke="#6b7688" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== Layer 1: platform / api gateway ===== -->
  <rect x="40" y="160" width="1100" height="196" rx="10" fill="#101826" stroke="#3f6ea5" stroke-width="1.5"/>
  <text x="58" y="182" fill="#7fb0e6" font-size="14" font-weight="bold">① dashscope-platform · dashscope-api  （Java/Spring Reactor 流量网关，远端）</text>

  <rect x="60" y="196" width="150" height="46" rx="5" fill="#14243a" stroke="#4a90d9"/>
  <text x="135" y="216" fill="#e6e6e6" font-size="12" text-anchor="middle">Frontend Server</text>
  <text x="135" y="232" fill="#7fa7d9" font-size="10.5" text-anchor="middle">→ InferenceRequest</text>
  <path d="M210 219 L246 219" stroke="#6b7688" stroke-width="1.8" marker-end="url(#a)"/>

  <rect x="248" y="196" width="640" height="140" rx="6" fill="#0d1a2a" stroke="#33587f"/>
  <text x="568" y="214" fill="#b8c2d6" font-size="12" text-anchor="middle" font-weight="bold">6 阶段 Handler Pipeline (HandlerPipeline.java)</text>
  <!-- stage chips -->
  <g font-size="10.5">
    <rect x="260" y="224" width="120" height="40" rx="4" fill="#1a2333" stroke="#33587f"/><text x="320" y="240" fill="#cfd8e6" text-anchor="middle">1 Pre-Request</text><text x="320" y="255" fill="#8a93a6" text-anchor="middle">meter/head</text>
    <rect x="390" y="224" width="230" height="40" rx="4" fill="#2a1f2f" stroke="#a05a9a"/><text x="505" y="240" fill="#f0cceb" text-anchor="middle" font-weight="bold">2 First-Request ◆◆◆</text><text x="505" y="255" fill="#d9a7d2" text-anchor="middle">限流→路由→均衡</text>
    <rect x="630" y="224" width="120" height="40" rx="4" fill="#1a2333" stroke="#33587f"/><text x="690" y="240" fill="#cfd8e6" text-anchor="middle">3 Post-Req</text><text x="690" y="255" fill="#8a93a6" text-anchor="middle">rewrite/decrypt</text>
    <rect x="760" y="224" width="116" height="40" rx="4" fill="#1a2a1a" stroke="#5fa85f"/><text x="818" y="240" fill="#cfe6cf" text-anchor="middle">4 Backend</text><text x="818" y="255" fill="#8fbf8f" text-anchor="middle">Invoke</text>

    <rect x="260" y="278" width="360" height="44" rx="4" fill="#2a1f2f" stroke="#a05a9a"/>
    <text x="440" y="296" fill="#f0cceb" text-anchor="middle">Stage2 ◆ LocalRateLimit(并发上限,内存) ◆ User/IncreaseRateLimit(Redis自适应)</text>
    <text x="440" y="312" fill="#f0cceb" text-anchor="middle">◆ RequestLimit(ClusterLimitService: Redis 固定窗口 QPS) → VirtualRoute → Balance</text>

    <rect x="630" y="278" width="246" height="44" rx="4" fill="#1a2333" stroke="#33587f"/>
    <text x="753" y="296" fill="#cfd8e6" text-anchor="middle">5 Pre-Response: 三级重试/超时</text>
    <text x="753" y="312" fill="#cfd8e6" text-anchor="middle">6 Post-Response: 计量/日志/backoff</text>
  </g>

  <rect x="906" y="210" width="220" height="120" rx="6" fill="#0d1a2a" stroke="#33587f"/>
  <text x="1016" y="230" fill="#b8c2d6" font-size="11.5" text-anchor="middle" font-weight="bold">路由/发现/均衡</text>
  <text x="1016" y="250" fill="#9fb0c6" font-size="10" text-anchor="middle">VirtualRoute(Filter→Selector)</text>
  <text x="1016" y="266" fill="#9fb0c6" font-size="10" text-anchor="middle">ServiceRoute + Nacos/PAI-EAS</text>
  <text x="1016" y="282" fill="#9fb0c6" font-size="10" text-anchor="middle">ServerListCache</text>
  <text x="1016" y="298" fill="#9fb0c6" font-size="10" text-anchor="middle">RoundRobin / 跨集群转发</text>
  <text x="1016" y="318" fill="#9fb0c6" font-size="10" text-anchor="middle">→ physicalServiceId → ip:port</text>

  <path d="M590 356 L590 380" stroke="#6b7688" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== Layer 2: Turbo / Global Batching ===== -->
  <rect x="40" y="382" width="1100" height="92" rx="10" fill="#1a1526" stroke="#8a6ac0" stroke-width="1.5"/>
  <text x="58" y="404" fill="#c0a0e6" font-size="14" font-weight="bold">② Turbo sidecar · 全局批调度 GlobalBatchingScheduler （protocol=batching 时）</text>
  <rect x="60" y="414" width="300" height="48" rx="5" fill="#2a1f3a" stroke="#8a6ac0"/>
  <text x="210" y="434" fill="#e6d6f5" font-size="11.5" text-anchor="middle" font-weight="bold">◆ Redis 队列 (LIST/ZSET/Bucket)</text>
  <text x="210" y="450" fill="#c0a7d9" font-size="10" text-anchor="middle">API 端 RPUSH/ZADD 入队, Turbo 拉取</text>
  <rect x="380" y="414" width="360" height="48" rx="5" fill="#2a1f3a" stroke="#8a6ac0"/>
  <text x="560" y="434" fill="#e6d6f5" font-size="11.5" text-anchor="middle" font-weight="bold">◆ 4 维准入 (running/prefilling × batch/token)</text>
  <text x="560" y="450" fill="#c0a7d9" font-size="10" text-anchor="middle">10 策略: weighted/binpack/cache-aware/length-aware/PD-prefill</text>
  <rect x="760" y="414" width="360" height="48" rx="5" fill="#2a1f3a" stroke="#8a6ac0"/>
  <text x="940" y="434" fill="#e6d6f5" font-size="11.5" text-anchor="middle" font-weight="bold">Turbo ProxyHandler → 本地引擎</text>
  <text x="940" y="450" fill="#c0a7d9" font-size="10" text-anchor="middle">instanceId(Redis SETNX) + Lua; Router 模式 tryAdmit→OVERLOADED</text>

  <path d="M590 474 L590 498" stroke="#6b7688" stroke-width="2" marker-end="url(#a)"/>
  <text x="700" y="490" fill="#8a93a6" font-size="10.5">gRPC/HTTP/WS → 本地 127.0.0.1:5000</text>

  <!-- ===== Layer 3: dashscope-serving ===== -->
  <rect x="40" y="500" width="1100" height="96" rx="10" fill="#101c10" stroke="#5fa85f" stroke-width="1.5"/>
  <text x="58" y="522" fill="#8fd68f" font-size="14" font-weight="bold">③ dashscope-serving （Python FastAPI/uvicorn；WebSocket 流式为 LLM 默认）— 无独立排队, 透传</text>
  <g font-size="10.5">
    <rect x="60" y="532" width="150" height="52" rx="5" fill="#14241a" stroke="#5fa85f"/><text x="135" y="552" fill="#e6e6e6" text-anchor="middle">WS/HTTP 入口</text><text x="135" y="568" fill="#8fbf8f" text-anchor="middle">RequestBody→QueryCtx</text>
    <rect x="222" y="532" width="180" height="52" rx="5" fill="#14241a" stroke="#5fa85f"/><text x="312" y="552" fill="#e6e6e6" text-anchor="middle">ServiceChain (装饰链)</text><text x="312" y="568" fill="#8fbf8f" text-anchor="middle">chat/completion/function</text>
    <rect x="414" y="532" width="200" height="52" rx="5" fill="#14241a" stroke="#5fa85f"/><text x="514" y="552" fill="#e6e6e6" text-anchor="middle">GPT3Service.preprocessor</text><text x="514" y="568" fill="#ffd9a0" text-anchor="middle">★ 分词 → input_ids</text>
    <rect x="626" y="532" width="180" height="52" rx="5" fill="#14241a" stroke="#5fa85f"/><text x="716" y="552" fill="#e6e6e6" text-anchor="middle">model.generate (流式)</text><text x="716" y="568" fill="#8fbf8f" text-anchor="middle">detok/后处理 回传</text>
    <rect x="818" y="532" width="300" height="52" rx="5" fill="#14241a" stroke="#5fa85f"/><text x="968" y="552" fill="#e6e6e6" text-anchor="middle">LLMClientV1 (dashserving/Rust)</text><text x="968" y="568" fill="#8fbf8f" text-anchor="middle">generate(req_id, prompt_token_ids, params) → :8887</text>
  </g>
  <path d="M590 596 L590 620" stroke="#6b7688" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== Layer 4: dashllm ===== -->
  <rect x="40" y="622" width="1100" height="96" rx="10" fill="#1c1410" stroke="#d9a94a" stroke-width="1.5"/>
  <text x="58" y="644" fill="#f0c878" font-size="14" font-weight="bold">④ dashllm （Python 引擎编排；驱动同步 vLLM v1 LLMEngine）</text>
  <g font-size="10.5">
    <rect x="60" y="654" width="180" height="52" rx="5" fill="#241c10" stroke="#d9a94a"/><text x="150" y="674" fill="#e6e6e6" text-anchor="middle">FrontendProcessor</text><text x="150" y="690" fill="#d9b87f" text-anchor="middle">协议解析/校验</text>
    <rect x="252" y="654" width="180" height="52" rx="5" fill="#241c10" stroke="#d9a94a"/><text x="342" y="674" fill="#e6e6e6" text-anchor="middle">EngineProcessor</text><text x="342" y="690" fill="#ffd0d0" text-anchor="middle">◆ _priority_admission</text>
    <rect x="444" y="654" width="200" height="52" rx="5" fill="#241c10" stroke="#d9a94a"/><text x="544" y="674" fill="#e6e6e6" text-anchor="middle">◆ _input_queue (线程交接)</text><text x="544" y="690" fill="#d9b87f" text-anchor="middle">后台线程 _run_sync_loop</text>
    <rect x="656" y="654" width="200" height="52" rx="5" fill="#241c10" stroke="#d9a94a"/><text x="756" y="674" fill="#e6e6e6" text-anchor="middle">engine.step() 循环</text><text x="756" y="690" fill="#d9b87f" text-anchor="middle">按 request_id 解复用</text>
    <rect x="868" y="654" width="250" height="52" rx="5" fill="#241c10" stroke="#d9a94a"/><text x="993" y="674" fill="#e6e6e6" text-anchor="middle">◆ output_queue_map (每请求)</text><text x="993" y="690" fill="#d9b87f" text-anchor="middle">PD 分离时: prefill/decode 拆分+KVT</text>
  </g>
  <path d="M590 718 L590 742" stroke="#6b7688" stroke-width="2" marker-end="url(#a)"/>

  <!-- ===== Layer 5: vLLM ===== -->
  <rect x="40" y="744" width="1100" height="120" rx="10" fill="#161a22" stroke="#d95f5f" stroke-width="1.5"/>
  <text x="58" y="766" fill="#f09a9a" font-size="14" font-weight="bold">⑤ vLLM v1 引擎调度器 scheduler.py （真正的逐 token 排队）</text>
  <rect x="60" y="776" width="230" height="72" rx="5" fill="#2a1414" stroke="#d95f5f"/>
  <text x="175" y="798" fill="#ffd0d0" font-size="11.5" text-anchor="middle" font-weight="bold">◆ waiting 队列</text>
  <text x="175" y="816" fill="#e0a0a0" font-size="10" text-anchor="middle">policy 排序; 准入需:</text>
  <text x="175" y="832" fill="#e0a0a0" font-size="10" text-anchor="middle">token预算+KV block+前缀缓存</text>
  <path d="M290 812 L326 812" stroke="#d95f5f" stroke-width="1.8" marker-end="url(#a2)"/>
  <rect x="328" y="776" width="260" height="72" rx="5" fill="#2a1414" stroke="#d95f5f"/>
  <text x="458" y="798" fill="#ffd0d0" font-size="11.5" text-anchor="middle" font-weight="bold">◆ running 集合 (schedule)</text>
  <text x="458" y="816" fill="#e0a0a0" font-size="10" text-anchor="middle">RUNNING优先; max_num_seqs 上限</text>
  <text x="458" y="832" fill="#e0a0a0" font-size="10" text-anchor="middle">allocate_slots 失败 → 抢占/backpressure</text>
  <path d="M588 812 L624 812" stroke="#d95f5f" stroke-width="1.8" marker-end="url(#a2)"/>
  <rect x="626" y="776" width="230" height="72" rx="5" fill="#2a1414" stroke="#d95f5f"/>
  <text x="741" y="798" fill="#ffd0d0" font-size="11.5" text-anchor="middle" font-weight="bold">每 step 分配 token</text>
  <text x="741" y="816" fill="#e0a0a0" font-size="10" text-anchor="middle">无 prefill/decode 之分</text>
  <text x="741" y="832" fill="#e0a0a0" font-size="10" text-anchor="middle">chunked prefill / spec decode</text>
  <path d="M856 812 L892 812" stroke="#d95f5f" stroke-width="1.8" marker-end="url(#a2)"/>
  <rect x="894" y="776" width="224" height="72" rx="5" fill="#2a1414" stroke="#d95f5f"/>
  <text x="1006" y="798" fill="#ffd0d0" font-size="11.5" text-anchor="middle" font-weight="bold">输出 token 流</text>
  <text x="1006" y="820" fill="#e0a0a0" font-size="10" text-anchor="middle">逐 step 回 output_queue → 逐层流式上行</text>

  <!-- response back arrow -->
  <path d="M1150 812 C 1168 812, 1168 118, 712 118" stroke="#5fa85f" stroke-width="1.6" fill="none" stroke-dasharray="6 4" marker-end="url(#a3)"/>
  <text x="1120" y="470" fill="#8fbf8f" font-size="11" text-anchor="middle" transform="rotate(90 1120 470)">流式 token 逐层回传 (SSE/WS)</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#6b7688"/></marker>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#d95f5f"/></marker>
    <marker id="a3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#5fa85f"/></marker>
  </defs>
</svg>
